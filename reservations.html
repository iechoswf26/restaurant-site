<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>restaurant-site</title>

    <link rel="stylesheet" href="styles.css">

</head>
<body>
<h1>Four Elements Udon</h1>
<p>"Happiness is a bowl of udon shared in peace."</p>

<div class="container">
    <img src="images/Four_Elements_Udon_Logo.png" alt="Four Elements Udon Logo" style ="width: 250px; height: 200px">
</div>

<h2>Reservations</h2>
<a href="index.html">Home</a>
<a href="menu.html">Menu</a>
<a href="reservations.html">Reservations</a>

<form action="" method="get">
    <label> First Name:
        <input type="text" name="first_name" maxlength="20" required>
    </label>

    <label> Last Name:
        <input type="text" name="last_name" required>
    </label>

    <br>

    <label> Email:
        <input type="email" name="" id="" required>
    </label>

    <br>

    <label> Party Size:
        <input type="number" name="party_size" min="1" max="8">
    </label>

    <br>

    <label> Date:
        <input type="date" name="date" required>
    </label>

    <br>

    <label> Time:
        <input type="time" name="time" required>
    </label>

    <br>

    <label> Seating Preference:
        <input type="radio" name="seat_pref" value="indoors" checked> Indoors
        <input type="radio" name="seat_pref" value="outdoors"> Outdoors
        <input type="radio" name="seat_pref" value="booth"> Booth
    </label>

    <br>

    <label> Dietary Notes:
        <input type="text" name="diet_notes" max="30">
    </label>

    <br>

    <label> Join our newsletter!
        <input type="checkbox" name="newsletter" value="yes"> Sure!
        <input type="checkbox" name="newsletter" value="no"> No thanks.
    </label>

    <br>

    <button type="submit">Submit</button>
    <button type="reset">Reset</button>

</form>

</body>
</html>
