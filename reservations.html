<!--Start Reservations Form-->
<div class="container col-md-8 col-lg-6">
    <div class="row">
        <div class="col">
            Reservations
        </div>
    </div>

    <div class="row">
        <div class="col">
            Reservations are "Request Only."
        </div>
    </div>

    <!--Alert Placement-->
    <div id="alertPlaceholder"></div>
    <button type="button" class="btn btn-primary" id="liveAlertBtn">Show live alert</button>

<!--    Start Customer Reservation Form-->
    <form id="customerReservation" name="customerReservation" action="" method="post" class="reservation-form mt-4">
        <fieldset>
            <legend>Patron Information</legend>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">First Name:</label>
                    <input type="text" class="form-control" name="first_name">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Last Name:</label>
                    <input type="text" class="form-control" name="last_name">
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Email:</label>
                    <input type="email" class="form-control" name="email" id="" placeholder="example@example.com">
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Party Size:</label>
                    <input type="number" name="party_size">
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Date:</label>
                    <input type="date" class="form-control" name="date">
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Time:</label>
                    <input type="time" class="form-control" name="time">
                </div>
            </div>

            <div class="row">
                <label class="form-label">Seating Preference:</label>

                <div class="form-check">
                    <input class="form-check-input" type="radio" name="seat_pref" value="indoors" checked> <label class="form-check-label">Indoors</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="radio" name="seat_pref" value="outdoors">
                    <label class="form-check-label">Outdoors</label>
                </div>

                <div class="form-check mb-3">
                    <input class="form-check-input" type="radio" name="seat_pref" value="bar">
                    <label class="form-check-label">Bar</label>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="diet_notes">Dietary Notes:</label>
                    <textarea class="form-control" name="diet_notes" placeholder="Optional" id="diet_notes"></textarea>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Join our newsletter!</label>
                    <input class="form-check-input" type="radio" name="newsletter" value="yes">Sure!
                    <input class="form-check-input" type="radio" name="newsletter" value="no"> No, thanks.
                </div>
            </div>

            <div>
                <button type="submit" class="btn btn-light">Submit</button>
                <button type="reset" class="btn btn-light">Reset</button>
            </div>

            <br>

        </fieldset>
    </form>

    <div id="results"></div>
</div>
