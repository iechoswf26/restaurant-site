<h1 class="title">Reservations</h1>

<div>
    <p1 class="reservation-request">Reservations are "request only."</p1>
</div>

<br>

<form action="" method="post" class="reservation-form">
    <fieldset>
        <legend>Patron Information</legend>

        <label> First Name:
            <input type="text" name="first_name" maxlength="20" required>
        </label>

        <br>

        <label> Last Name:
            <input type="text" name="last_name" maxlength="20" required>
        </label>

        <br>

        <label> Email:
            <input type="email" name="" id="" placeholder="example@example.com" required>
        </label>

        <br>

        <label> Party Size:
            <input type="number" name="party_size" min="1" max="8">
        </label>

        <br>

        <label> Date:
            <input type="date" name="date" required>
        </label>

        <br>

        <label> Time:
            <input type="time" name="time" required>
        </label>

        <br>

        <label> Seating Preference:
            <input type="radio" name="seat_pref" value="indoors" checked> Indoors
            <input type="radio" name="seat_pref" value="outdoors"> Outdoors
            <input type="radio" name="seat_pref" value="bar"> Bar
        </label>

        <br>

        <label> Dietary Notes:
            <input type="text" name="diet_notes" placeholder="Optional" max="30">
        </label>

        <br>

        <label> Join our newsletter!
            <input type="checkbox" name="newsletter" value="yes"> Sure!
            <input type="checkbox" name="newsletter" value="no"> No, thanks.
        </label>

        <br>

        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </fieldset>

</form>


<div class="owner-card">
